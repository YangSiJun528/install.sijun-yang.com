name: Check

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "redirects.json"
      - "worker.js"
      - "validate-config.mjs"
      - "router.test.js"
      - "package.json"
      - "package-lock.json"
      - "wrangler.toml"
      - ".github/workflows/check.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run check
